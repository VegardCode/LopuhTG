name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git libssl-dev libffi-dev python3-dev
          pip3 install --user --upgrade buildozer Cython==0.29.33

      - name: Create buildozer.spec
        run: |
          # Этот скрипт сам создаст настройки, чтобы тебе не мучиться
          buildozer init
          sed -i 's/package.name = myapp/package.name = lopuhapp/' buildozer.spec
          sed -i 's/package.domain = org.test/package.domain = org.lopuh/' buildozer.spec
          sed -i 's/source.include_exts = py,png,jpg,kv,atlas/source.include_exts = py,png,jpg,html,css,js/' buildozer.spec

      - name: Build APK
        run: |
          # Магия сборки (в первый раз может идти минут 10)
          yes | buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: my-cool-apk
          path: bin/*.apk
