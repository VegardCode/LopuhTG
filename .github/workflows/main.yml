name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract project
        run: |
          unzip -o project.zip -d .
          # Проверяем, что index.html на месте
          find . -name "index.html"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Buildozer and Dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git libssl-dev libffi-dev python3-dev autoconf libtool zip unzip zlib1g-dev strace
          pip3 install --user --upgrade buildozer Cython==0.29.33

      - name: Accept Android Licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | buildozer android pdist || true

      - name: Build APK
        run: |
          # Запускаем чистую сборку
          buildozer -v android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LOPUH_FINAL_RELEASE
          path: bin/*.apk
